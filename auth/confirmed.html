<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Email confirmado — CorrerJuntos</title>
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0b1220;
      --paper: #f6f1e8;
      --ember: #f97316;
      --ember-deep: #ea580c;
      --ash: rgba(246, 241, 232, 0.42);
      --ash-fade: rgba(246, 241, 232, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--ink);
      color: var(--paper);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      min-height: 100vh;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: var(--ink);
      border: 1px solid var(--ash-fade);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .accent-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--ember);
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ember);
      font-weight: 500;
      margin-bottom: 24px;
    }
    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 32px;
      height: 1px;
      background: var(--ember);
      vertical-align: middle;
      margin-right: 10px;
    }
    h1 {
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 200;
      margin-bottom: 20px;
    }
    h1 strong { color: var(--ember); font-weight: 700; }
    p {
      font-size: 15px;
      line-height: 1.65;
      color: rgba(246, 241, 232, 0.72);
      margin-bottom: 28px;
    }
    .cta {
      display: inline-block;
      padding: 16px 32px;
      background: var(--ember);
      color: var(--ink);
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.25);
      transition: transform 0.15s ease;
    }
    .cta:hover { transform: translateY(-1px); }
    .stores {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .store {
      border: 1px solid var(--ash-fade);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--paper);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    .store:hover { border-color: var(--ash); }
    .divider {
      height: 1px;
      background: var(--ash-fade);
      margin: 28px 0 20px;
    }
    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(246, 241, 232, 0.28);
    }
    .footer a { color: rgba(246, 241, 232, 0.42); text-decoration: none; }
    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-top: 22px;
    }
    .brand em { font-style: normal; color: var(--ember); }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent-dot"></div>
    <div class="eyebrow">Cuenta verificada</div>
    <h1>Email <strong>confirmado</strong>.<br>Abre la app para continuar.</h1>
    <p>Tu cuenta ya está activa. Abre CorrerJuntos e inicia sesión con las credenciales que usaste al registrarte.</p>

    <a href="correrjuntos://login" class="cta" id="openAppBtn">Abrir CorrerJuntos &nbsp;→</a>

    <div class="divider"></div>

    <p style="font-size:13px; margin-bottom:16px;">¿No tienes la app instalada?</p>
    <div class="stores">
      <a href="https://apps.apple.com/es/app/correr-juntos/id6758505910" class="store" target="_blank" rel="noopener">App Store</a>
      <a href="https://play.google.com/store/apps/details?id=com.correrjuntos.app" class="store" target="_blank" rel="noopener">Google Play</a>
    </div>

    <div class="brand">Correr<em>Juntos</em></div>
    <div class="footer" style="margin-top:16px;">
      <a href="https://www.correrjuntos.com">correrjuntos.com</a>
    </div>
  </div>

  <script>
    // No auto-jump. Historically we tried to redirect to correrjuntos://login
    // automatically after 600ms, but in Gmail's in-app webview (where Universal
    // Links don't fire) this produced the "¿Permitir abrir app?" system prompt
    // on page load without any user intent — which feels broken.
    //
    // The correct UX: user lands on this page, reads "Email confirmado",
    // and explicitly taps "Abrir CorrerJuntos →" to launch the app. One
    // deliberate click instead of a prompt they didn't ask for.
    //
    // For users who arrive through Apple Mail or Safari, iOS fires the
    // Universal Link BEFORE this page even renders, so they never see it.
  </script>
</body>
</html>
