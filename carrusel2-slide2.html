<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,system-ui,sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:url('https://images.pexels.com/photos/3621183/pexels-photo-3621183.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;opacity:.06;pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;text-align:center}
h2{font-size:56px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-2px;margin-bottom:20px}
h2 span{color:#f97316}
.desc{font-size:22px;color:#94a3b8;line-height:1.6;max-width:700px;margin-bottom:50px}
.steps{display:flex;flex-direction:column;gap:20px;width:100%;max-width:700px}
.step{display:flex;align-items:center;gap:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px 28px;text-align:left}
.step-num{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#f97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.step-content{flex:1}
.step-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.step-desc{font-size:16px;color:#94a3b8}
.slide-num{position:absolute;top:50px;right:60px;font-size:18px;font-weight:700;color:rgba(255,255,255,.3)}
.logo{position:absolute;top:50px;left:60px;font-weight:900;font-size:22px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.swipe{position:absolute;bottom:50px;left:0;right:0;text-align:center;color:rgba(255,255,255,.3);font-size:16px;font-weight:500}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="content">
  <h2>Como funciona<br>el <span>matching</span></h2>
  <p class="desc">3 pasos para encontrar tu companero perfecto</p>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-content">
        <div class="step-title">Crea tu perfil runner</div>
        <div class="step-desc">Indica tu ritmo, horario y zona</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-content">
        <div class="step-title">El algoritmo te conecta</div>
        <div class="step-desc">Matching por ritmo, nivel y disponibilidad</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-content">
        <div class="step-title">Corre acompanado</div>
        <div class="step-desc">Conecta, crea quedadas y entrena juntos</div>
      </div>
    </div>
  </div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">2/5</div>
<div class="swipe">Desliza →</div>
</body>
</html>
