<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>IG Slide 8 — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#f97316;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#0b1220}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,0.15) 0%,transparent 60%);pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:100px 80px;text-align:center;align-items:center}
.eyebrow{font-size:20px;font-weight:800;color:#0b1220;letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;opacity:0.9}
h1{font-size:128px;font-weight:900;line-height:0.9;letter-spacing:-5px;margin-bottom:24px;color:#0b1220}
.tag{display:inline-block;background:#0b1220;color:#f97316;padding:6px 18px;border-radius:8px;font-weight:900;letter-spacing:-2px}
.sub{font-size:32px;color:rgba(11,18,32,0.85);font-weight:600;margin-bottom:60px;max-width:850px;line-height:1.35}
.cta-box{background:#0b1220;border-radius:24px;padding:36px 56px;display:inline-block;margin-bottom:36px;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.cta-pre{font-size:14px;font-weight:700;color:#f97316;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.cta-text{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px}
.handle{font-size:24px;color:rgba(11,18,32,0.7);font-weight:600}
.handle strong{color:#0b1220;font-weight:900}
.stores{display:flex;gap:16px;justify-content:center;margin-top:24px}
.store{background:#0b1220;color:#fff;padding:14px 24px;border-radius:14px;font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.logo{position:absolute;top:60px;left:80px;font-weight:900;font-size:24px;letter-spacing:-1px}
.logo-c{color:#0b1220}.logo-j{color:#fff;background:#0b1220;padding:2px 8px;border-radius:4px}
.slide-num{position:absolute;top:60px;right:80px;font-size:18px;font-weight:700;color:rgba(11,18,32,.4);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">No corras solo nunca más</div>
  <h1>Búscame.<br><span class="tag">Soy José</span></h1>
  <p class="sub">Descarga la app. Date un perfil de runner. Empieza por ahí.</p>
  <div class="cta-box">
    <div class="cta-pre">Disponible en</div>
    <div class="cta-text">App Store · Google Play</div>
  </div>
  <div class="handle"><strong>correrjuntos.com</strong></div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">08 / 08</div>
</body></html>
