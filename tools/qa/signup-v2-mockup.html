<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Crear cuenta v2 — Correr Juntos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0b0b0d;
    --ink-2: #14141a;
    --paper: #f6f1e8;
    --mute: rgba(246, 241, 232, 0.62);
    --mute-2: rgba(246, 241, 232, 0.38);
    --line: rgba(246, 241, 232, 0.10);
    --surface: rgba(246, 241, 232, 0.04);
    --ember: #f97316;
    --ember-deep: #ea580c;
    --gold: #fbbf24;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv01", "cv11";
  }
  .canvas {
    width: 1080px;
    height: 1920px;
    padding: 64px;
    position: relative;
    overflow: hidden;
    background: var(--ink);
  }

  /* ── Header row ── */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 48px;
  }
  .back {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--paper);
    font-size: 16px;
    font-weight: 600;
  }
  .back svg { stroke: currentColor; }

  .progress-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(246,241,232,0.18); }
  .dot.active { background: var(--ember); width: 24px; border-radius: 4px; }
  .progress-text {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--mute-2);
    font-weight: 600;
    text-transform: uppercase;
    margin-left: 10px;
  }

  /* ── Title ── */
  .title {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 60px;
    color: var(--paper);
    margin-bottom: 16px;
  }
  .title-accent {
    width: 42px;
    height: 3px;
    background: var(--ember);
    border-radius: 2px;
    margin-bottom: 18px;
  }
  .subtitle {
    font-size: 20px;
    color: var(--mute);
    font-weight: 400;
    letter-spacing: -0.2px;
    margin-bottom: 24px;
    line-height: 28px;
  }

  /* ── Social proof strip ── */
  .proof-strip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 100px;
    margin-bottom: 40px;
  }
  .proof-strip .stars { color: var(--gold); letter-spacing: -1px; font-size: 12px; }
  .proof-strip .text { color: var(--mute); font-size: 13px; font-weight: 500; }
  .proof-strip .text b { color: var(--paper); font-weight: 600; }
  .proof-strip .dot-sep { color: var(--mute-2); }

  /* ── OAuth Buttons ── */
  .oauth-wrap { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .oauth-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    background: #fff;
    border-radius: 16px;
    color: #000;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .oauth-btn.apple svg { fill: #000; }
  .oauth-btn.google-text { color: #374151; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--line); }
  .divider-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--mute-2);
    text-transform: uppercase;
  }

  /* ── Form Fields ── */
  .field { margin-bottom: 22px; }
  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--mute);
    margin-bottom: 10px;
    letter-spacing: -0.1px;
  }
  .field-input {
    width: 100%;
    padding: 22px 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    color: var(--paper);
    font-size: 16px;
    font-family: inherit;
  }
  .field-input-row {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding-right: 20px;
  }
  .field-input-row input {
    flex: 1;
    padding: 22px 20px;
    background: transparent;
    border: none;
    color: var(--paper);
    font-size: 16px;
    font-family: inherit;
  }
  .eye-icon { color: var(--mute-2); }
  .trust-line {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--mute-2);
    font-weight: 500;
  }
  .trust-line svg { color: var(--green); }
  .trust-line b { color: var(--mute); font-weight: 600; }

  /* ── Password strength bar ── */
  .strength {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .strength-bars {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .strength-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: rgba(246,241,232,0.08);
  }
  .strength-bar.filled.weak { background: #ef4444; }
  .strength-bar.filled.med { background: #f59e0b; }
  .strength-bar.filled.strong { background: #22c55e; }
  .strength-label {
    font-size: 12px;
    font-weight: 600;
    color: #22c55e;
    letter-spacing: -0.1px;
  }

  /* ── Terms ── */
  .terms {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    margin-bottom: 28px;
  }
  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid rgba(246,241,232,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .checkbox.checked {
    background: var(--ember);
    border-color: var(--ember);
    color: #fff;
    font-size: 13px;
    font-weight: 900;
  }
  .terms-text {
    font-size: 13px;
    color: var(--mute);
    letter-spacing: -0.1px;
    flex: 1;
  }
  .terms-link { color: var(--ember); font-weight: 600; }

  /* ── CTA ── */
  .cta {
    display: block;
    width: 100%;
    padding: 24px;
    background: linear-gradient(90deg, var(--ember) 0%, var(--ember-deep) 100%);
    border-radius: 18px;
    border: none;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.2px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(249, 115, 22, 0.25);
    margin-bottom: 24px;
  }

  /* ── Login link ── */
  .login-link {
    text-align: center;
    font-size: 14px;
    color: var(--mute);
  }
  .login-link a { color: var(--ember); font-weight: 700; }
</style>
</head>
<body>

<div class="canvas">

  <!-- Header: back + progress -->
  <div class="header-row">
    <div class="back">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      Volver
    </div>
    <div class="progress-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <span class="progress-text">Paso 1 · 2</span>
    </div>
  </div>

  <!-- Title -->
  <h1 class="title">Crear cuenta</h1>
  <div class="title-accent"></div>
  <p class="subtitle">Empieza en 30 segundos. Sin tarjeta.</p>

  <!-- Social proof strip -->
  <div class="proof-strip">
    <span class="stars">★★★★★</span>
    <span class="text"><b>4.6</b></span>
    <span class="dot-sep">·</span>
    <span class="text"><b>500+</b> runners</span>
    <span class="dot-sep">·</span>
    <span class="text">App Store</span>
  </div>

  <!-- OAuth -->
  <div class="oauth-wrap">
    <button class="oauth-btn apple">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
      </svg>
      Continuar con Apple
    </button>
    <button class="oauth-btn google-text">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">O continúa con</span>
    <div class="divider-line"></div>
  </div>

  <!-- Email field -->
  <div class="field">
    <label class="field-label">Email</label>
    <input class="field-input" type="email" placeholder="tu@email.com" value="" />
    <div class="trust-line">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Solo para el login. <b>Cero spam.</b> Nunca lo compartimos.
    </div>
  </div>

  <!-- Password field -->
  <div class="field">
    <label class="field-label">Contraseña</label>
    <div class="field-input-row">
      <input type="password" placeholder="Mínimo 8 caracteres" value="••••••••••" />
      <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <div class="strength">
      <div class="strength-bars">
        <div class="strength-bar filled strong"></div>
        <div class="strength-bar filled strong"></div>
        <div class="strength-bar filled strong"></div>
      </div>
      <span class="strength-label">Strong</span>
    </div>
  </div>

  <!-- Terms -->
  <div class="terms">
    <div class="checkbox checked">✓</div>
    <div class="terms-text">
      Acepto <span class="terms-link">términos</span> y <span class="terms-link">privacidad</span>.
    </div>
  </div>

  <!-- CTA -->
  <button class="cta">Crear cuenta gratis</button>

  <!-- Login link -->
  <div class="login-link">
    ¿Ya tienes cuenta? <a>Inicia sesión</a>
  </div>

</div>

</body>
</html>
