<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Slide 5 — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',sans-serif;color:#f6f1e8;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(249,115,22,0.10) 0%,transparent 65%);pointer-events:none}
.frame{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:90px 80px;justify-content:space-between}
.top{display:flex;flex-direction:column}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;color:#f97316;font-weight:600;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.eyebrow::before{content:'';width:50px;height:1px;background:#f97316}
.coords{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:500;letter-spacing:1.5px}

/* Center monumental */
.center{display:flex;flex-direction:column;align-items:flex-start;flex:1;justify-content:center;margin-top:-80px}
.huge{font-size:140px;font-weight:900;line-height:0.92;letter-spacing:-7px;color:#f6f1e8}
.huge .accent{color:#f97316}
.huge-bottom{font-size:140px;font-weight:900;line-height:0.92;letter-spacing:-7px;color:#f6f1e8;margin-top:0}

.divider{width:120px;height:2px;background:#f97316;margin:50px 0 40px}

.subtitle{font-size:32px;font-weight:600;color:rgba(246,241,232,0.80);line-height:1.3;letter-spacing:-0.5px;max-width:780px}
.subtitle strong{color:#f97316;font-weight:800}

/* CTA section */
.cta-stack{display:flex;flex-direction:column;gap:20px;margin-top:60px}
.cta-button{background:#f97316;color:#0b1220;padding:32px 40px;border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.cta-text{font-size:34px;font-weight:800;letter-spacing:-0.8px}
.cta-arrow{font-size:42px;font-weight:900}
.cta-stores{display:flex;gap:12px;justify-content:center;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;color:rgba(246,241,232,0.55);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.cta-stores span{padding:0 14px}
.cta-stores .sep{color:rgba(246,241,232,0.20);padding:0 4px}

/* Bottom */
.bottom{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(246,241,232,0.10);padding-top:30px;margin-top:60px}
.brand-block{display:flex;flex-direction:column;gap:6px}
.brand{font-size:32px;font-weight:800;color:#f97316;letter-spacing:0.5px}
.brand-tag{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.55);font-weight:500;letter-spacing:2px;text-transform:uppercase}
.url{text-align:right;font-family:'JetBrains Mono',monospace;font-size:18px;color:rgba(246,241,232,0.65);font-weight:600;letter-spacing:0.5px}

.page-ind{position:absolute;top:60px;right:60px;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.40);font-weight:600;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="frame">
  <div class="page-ind">05 / 05</div>

  <div class="top">
    <div class="eyebrow">Tu turno</div>
    <div class="coords">START: AHORA · COST: 0€ · LOCATION: TU ZONA</div>
  </div>

  <div class="center">
    <div class="huge">Empieza</div>
    <div class="huge-bottom"><span class="accent">hoy.</span></div>

    <div class="divider"></div>

    <div class="subtitle">
      Plan <strong>0→5K</strong> gratis.<br>
      Tu primera carrera en <strong>6 semanas</strong>.
    </div>

    <div class="cta-stack">
      <div class="cta-button">
        <div class="cta-text">Descarga CorrerJuntos</div>
        <div class="cta-arrow">→</div>
      </div>
      <div class="cta-stores">
        <span>iOS</span>
        <span class="sep">·</span>
        <span>Android</span>
        <span class="sep">·</span>
        <span>650+ corredores</span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="brand-block">
      <div class="brand">CorrerJuntos</div>
      <div class="brand-tag">No corras solo</div>
    </div>
    <div class="url">correrjuntos.com</div>
  </div>
</div>
</body></html>
