<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:628px;background:#0b1220;font-family:'Inter',-apple-system,system-ui,sans-serif;overflow:hidden;position:relative}

body::before{content:'';position:absolute;inset:0;background:url('https://images.pexels.com/photos/2526878/pexels-photo-2526878.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;opacity:.06;pointer-events:none}

/* Left content — stays within 55% */
.content{position:absolute;top:0;left:0;width:55%;height:100%;padding:50px 50px;display:flex;flex-direction:column;justify-content:center;z-index:3}

.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,.12);border:1.5px solid rgba(249,115,22,.35);padding:7px 16px;border-radius:100px;font-size:11px;font-weight:700;color:#f97316;letter-spacing:1px;text-transform:uppercase;width:fit-content;margin-bottom:20px}
.badge::before{content:'';width:6px;height:6px;background:#f97316;border-radius:50%}

.headline{font-size:40px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1.5px;margin-bottom:12px}
.headline span{color:#f97316}

.subtitle{font-size:15px;color:#94a3b8;line-height:1.6;margin-bottom:24px;max-width:360px}

.cta-row{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.cta-btn{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:800;letter-spacing:-.3px;box-shadow:0 6px 24px rgba(249,115,22,.3)}
.cta-sub{color:#64748b;font-size:13px;font-weight:500}

.stats{display:flex;gap:10px}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;text-align:center;flex:1}
.stat-num{font-size:18px;font-weight:800;color:#f97316}
.stat-label{font-size:10px;color:#64748b;margin-top:2px;font-weight:500}

/* Right phone — within 45%, single phone */
.phone-area{position:absolute;top:0;right:0;width:45%;height:100%;display:flex;align-items:center;justify-content:center;z-index:2}

.phone-glow{position:absolute;top:50%;right:18%;transform:translate(50%,-50%);width:350px;height:350px;background:radial-gradient(circle,rgba(249,115,22,.1) 0%,transparent 70%);pointer-events:none;z-index:1}

.phone{width:220px;height:440px;background:#000;border-radius:30px;padding:5px;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.08);position:relative;z-index:3;transform:rotate(-3deg)}
.phone img{width:100%;height:100%;border-radius:25px;display:block;object-fit:cover}

/* Bottom */
.bottom-left{position:absolute;bottom:20px;left:50px;z-index:4}
.logo{font-weight:900;font-size:16px;letter-spacing:-.5px}
.logo-c{color:#fff}
.logo-j{color:#f97316}
.bottom-right{position:absolute;bottom:24px;right:50px;z-index:4;color:#475569;font-size:12px;font-weight:500}

/* Vertical separator */
.separator{position:absolute;top:50px;bottom:50px;left:55%;width:1px;background:linear-gradient(to bottom,transparent,rgba(249,115,22,.15),transparent);z-index:1}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="phone-glow"></div>
<div class="separator"></div>

<div class="content">
<div class="badge">Running Social + Coach IA</div>
<div class="headline">Encuentra runners<br>de tu nivel.<br>Entrena con <span>IA.</span></div>
<div class="subtitle">Coach Jose analiza cada carrera. Matching por ritmo, horario y zona.</div>
<div class="cta-row">
<div class="cta-btn">Descarga gratis</div>
<div class="cta-sub">Prueba 7 dias gratis</div>
</div>
<div class="stats">
<div class="stat">
<div class="stat-num">736+</div>
<div class="stat-label">Runners</div>
</div>
<div class="stat">
<div class="stat-num">8</div>
<div class="stat-label">Ciudades</div>
</div>
<div class="stat">
<div class="stat-num">4.8</div>
<div class="stat-label">App Store</div>
</div>
</div>
</div>

<div class="phone-area">
<div class="phone">
<img src="public/screenshot-feed.webp" alt="CorrerJuntos Feed">
</div>
</div>

<div class="bottom-left">
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
</div>
<div class="bottom-right">@correrjuntosapp</div>

</body>
</html>
