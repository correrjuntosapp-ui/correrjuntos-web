<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0e0e0; }
  .canvas {
    width: 1080px;
    height: 1080px;
    background: #FF6B00;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
    position: relative;
  }
  .main-text {
    color: #FFFFFF;
    font-size: 82px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 80px;
    margin-bottom: 40px;
  }
  .subtitle {
    color: #FFFFFF;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.4;
    padding: 0 100px;
    opacity: 0.92;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 30px 0 28px;
    text-align: center;
    background: rgba(0,0,0,0.15);
  }
  .brand {
    color: #FFFFFF;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .url {
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 4px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="main-text">TU PRIMER KM<br>EMPIEZA HOY</div>
    <div class="subtitle">Guía completa para empezar<br>a correr desde cero</div>
    <div class="bottom-bar">
      <div class="brand">CORRERJUNTOS</div>
      <div class="url">correrjuntos.com</div>
    </div>
  </div>
</body>
</html>
