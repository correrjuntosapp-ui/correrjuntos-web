<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 2: Nivel — CorrerJuntos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0C;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 100%;
    max-width: 375px;
    background: #111214;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .dynamic-island {
    width: 120px; height: 32px;
    background: #000;
    border-radius: 18px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }

  /* ─── Header ──────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 8px;
    flex-shrink: 0;
  }
  .btn-back {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.12); }
  .header-title { font-size: 15px; font-weight: 600; color: #F5F5F7; letter-spacing: -0.2px; }
  .header-spacer { width: 34px; }

  /* ─── Step Dots ───────────────────────── */
  .step-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 8px 0 2px;
    flex-shrink: 0;
  }
  .step-dot { height: 4px; border-radius: 2px; background: #2A2A2E; }
  .step-dot.active { width: 22px; background: #FF6B00; }
  .step-dot.done { width: 6px; background: #555; }
  .step-dot.inactive { width: 6px; }

  /* ─── Scroll Area ─────────────────────── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
    scrollbar-width: none;
    min-height: 0;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ─── Title ───────────────────────────── */
  .section-title {
    font-size: 26px;
    font-weight: 800;
    color: #F5F5F7;
    letter-spacing: -0.5px;
    margin-top: 20px;
    margin-bottom: 4px;
    line-height: 1.15;
  }
  .section-subtitle {
    font-size: 14px;
    color: #8A8A96;
    margin-bottom: 28px;
    line-height: 1.4;
  }

  /* ─── Level Card ──────────────────────── */
  .level-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 16px;
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.07);
    background: #1C1C20;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .level-card:hover { background: #252529; border-color: rgba(255,255,255,0.12); }
  .level-card:active { transform: scale(0.988); }

  .level-card.selected {
    background: #1F1A14;
    border-color: #FF6B00;
    border-width: 2px;
  }
  .level-card.selected:hover { background: #231D15; }

  /* Icon */
  .level-icon {
    width: 44px; height: 44px;
    min-width: 44px;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .level-card.selected .level-icon { transform: scale(1.06); }

  /* Body */
  .level-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .level-name {
    font-size: 16px;
    font-weight: 700;
    color: #F5F5F7;
    letter-spacing: -0.2px;
  }
  .level-desc {
    font-size: 13px;
    color: #8A8A96;
    line-height: 1.4;
  }

  /* Radio */
  .radio-wrap {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #3A3A42;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    background: transparent;
  }
  .level-card.selected .radio-wrap {
    background: #FF6B00;
    border-color: #FF6B00;
    box-shadow: 0 0 0 3px rgba(255,107,0,0.18);
  }
  .radio-check {
    opacity: 0;
    transform: scale(0.4);
    transition: all 0.2s ease;
  }
  .level-card.selected .radio-check {
    opacity: 1;
    transform: scale(1);
  }

  /* ─── Footer ──────────────────────────── */
  .footer {
    padding: 10px 16px 24px;
    flex-shrink: 0;
    background: #111214;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .btn-continue {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-continue.inactive {
    background: #2A2A2E;
    color: #4A4A55;
    cursor: not-allowed;
  }
  .btn-continue.active {
    background: linear-gradient(135deg, #FF6B00 0%, #FF8C38 100%);
    color: #FFFFFF;
    box-shadow: 0 4px 20px rgba(255,107,0,0.32);
  }
  .btn-continue.active:hover {
    box-shadow: 0 6px 28px rgba(255,107,0,0.45);
    transform: translateY(-1px);
  }
  .btn-continue.active:active {
    transform: scale(0.98);
    box-shadow: 0 2px 12px rgba(255,107,0,0.3);
  }
  .footer-status {
    text-align: center;
    font-size: 12px;
    color: #4A4A55;
    margin-top: 8px;
    font-weight: 500;
    min-height: 15px;
  }
  .footer-status.has-selection { color: #FF6B00; }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>

  <div class="header">
    <button class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="#8A8A96" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="header-title">Crear tu plan</span>
    <div class="header-spacer"></div>
  </div>

  <!-- Dot 1 done, dot 2 active -->
  <div class="step-dots">
    <div class="step-dot done"></div>
    <div class="step-dot active"></div>
    <div class="step-dot inactive"></div>
    <div class="step-dot inactive"></div>
    <div class="step-dot inactive"></div>
  </div>

  <div class="scroll-area">
    <div class="section-title">¿Cuál es tu nivel?</div>
    <div class="section-subtitle">Esto nos ayuda a personalizar tu plan</div>

    <!-- 1. Principiante -->
    <div class="level-card" data-level="Principiante" onclick="selectLevel(this)">
      <div class="level-icon" style="background: rgba(34,197,94,0.13);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="4" r="2" fill="#22C55E"/>
          <path d="M12 6.5L10 11H14L12 6.5Z" fill="#22C55E"/>
          <path d="M10 11L7.5 20" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M14 11L16.5 20" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9 9L7 10.5" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M15 9L17 10.5" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="level-body">
        <span class="level-name">Principiante</span>
        <span class="level-desc">Corro poco o nada, quiero empezar</span>
      </div>
      <div class="radio-wrap">
        <svg class="radio-check" width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- 2. Intermedio -->
    <div class="level-card" data-level="Intermedio" onclick="selectLevel(this)">
      <div class="level-icon" style="background: rgba(96,165,250,0.13);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="14" cy="3.5" r="2" fill="#60A5FA"/>
          <path d="M14 5.5L11.5 10.5" stroke="#60A5FA" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M11.5 8L8 9.5" stroke="#60A5FA" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M11.5 10.5L9 17M11.5 10.5L14.5 14.5" stroke="#60A5FA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14.5 14.5L17 19" stroke="#60A5FA" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="level-body">
        <span class="level-name">Intermedio</span>
        <span class="level-desc">Corro 2-3 veces por semana</span>
      </div>
      <div class="radio-wrap">
        <svg class="radio-check" width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- 3. Avanzado -->
    <div class="level-card" data-level="Avanzado" onclick="selectLevel(this)">
      <div class="level-icon" style="background: rgba(249,115,22,0.13);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L4.5 13.5H11.5L10 22L19.5 10.5H12.5L13 2Z" fill="#F97316"/>
        </svg>
      </div>
      <div class="level-body">
        <span class="level-name">Avanzado</span>
        <span class="level-desc">Entreno 4+ veces y he competido</span>
      </div>
      <div class="radio-wrap">
        <svg class="radio-check" width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-continue inactive" id="btnContinue" disabled>Continuar</button>
    <div class="footer-status" id="footerStatus">Sin selección</div>
  </div>
</div>

<script>
  var selected = null;
  function selectLevel(card) {
    if (selected) selected.classList.remove('selected');
    if (selected === card) { selected = null; updateFooter(null); return; }
    card.classList.add('selected');
    selected = card;
    updateFooter(card.dataset.level);
  }
  function updateFooter(level) {
    var btn = document.getElementById('btnContinue');
    var status = document.getElementById('footerStatus');
    if (level) {
      btn.className = 'btn-continue active'; btn.disabled = false;
      status.textContent = 'Nivel: ' + level;
      status.className = 'footer-status has-selection';
    } else {
      btn.className = 'btn-continue inactive'; btn.disabled = true;
      status.textContent = 'Sin selección';
      status.className = 'footer-status';
    }
  }
</script>
</body>
</html>
