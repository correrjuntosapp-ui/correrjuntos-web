<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Slide 4 — Prueba comunidad</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',sans-serif;color:#f6f1e8;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 50%,rgba(249,115,22,0.05) 0%,transparent 60%);pointer-events:none}
.frame{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:90px 80px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;color:#f97316;font-weight:600;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.eyebrow::before{content:'';width:50px;height:1px;background:#f97316}
.coords{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:500;letter-spacing:1.5px;margin-bottom:80px}

.title{font-size:78px;font-weight:800;line-height:0.95;letter-spacing:-3px;color:#f6f1e8;margin-bottom:120px}
.title .accent{color:#f97316}

/* Numbers monumentales */
.numbers{display:flex;flex-direction:column;gap:60px;flex:1}
.num-block{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(246,241,232,0.10);padding-bottom:36px}
.num-big{font-size:240px;font-weight:900;line-height:0.85;letter-spacing:-12px;color:#f97316;font-family:'Inter',sans-serif}
.num-info{text-align:right;display:flex;flex-direction:column;gap:6px;padding-bottom:30px}
.num-label{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:#f6f1e8;letter-spacing:0;text-transform:uppercase}
.num-context{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:rgba(246,241,232,0.45);letter-spacing:1.5px;text-transform:uppercase}

.tagline{margin-top:60px;text-align:center;padding:30px 0;border-top:1px solid rgba(246,241,232,0.10)}
.tagline-text{font-size:34px;font-weight:700;color:#f6f1e8;letter-spacing:-0.8px;line-height:1.2}
.tagline-text .accent{color:#f97316}

.bottom{display:flex;justify-content:space-between;align-items:flex-end;margin-top:30px}
.bottom-left{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:600;letter-spacing:1.5px}
.brand{font-size:22px;font-weight:800;color:#f97316;letter-spacing:0.5px}
.page-ind{position:absolute;top:60px;right:60px;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.40);font-weight:600;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="frame">
  <div class="page-ind">04 / 05</div>

  <div class="eyebrow">No estás solo</div>
  <div class="coords">COMMUNITY: CRECIENDO · CHANNEL: ORGANIC</div>

  <div class="title">
    La <span class="accent">comunidad</span><br>
    que te espera
  </div>

  <div class="numbers">
    <div class="num-block">
      <div class="num-big">650+</div>
      <div class="num-info">
        <div class="num-label">Corredores</div>
        <div class="num-context">REGISTRADOS · ACTIVOS</div>
      </div>
    </div>
    <div class="num-block">
      <div class="num-big">30</div>
      <div class="num-info">
        <div class="num-label">Países</div>
        <div class="num-context">4 CONTINENTES</div>
      </div>
    </div>
    <div class="num-block">
      <div class="num-big">8</div>
      <div class="num-info">
        <div class="num-label">Ciudades</div>
        <div class="num-context">QUEDADAS REALES</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-left">SLIDE 04 · COMUNIDAD</div>
    <div class="brand">CorrerJuntos</div>
  </div>
</div>
</body></html>
