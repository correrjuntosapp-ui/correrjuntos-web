<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 4: Días — CorrerJuntos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0C; min-height: 100vh;
    display: flex; justify-content: center; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .phone { width: 100%; max-width: 375px; background: #111214; display: flex; flex-direction: column; height: 100vh; }
  .dynamic-island { width: 120px; height: 32px; background: #000; border-radius: 18px; margin: 10px auto 0; flex-shrink: 0; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 8px; flex-shrink: 0; }
  .btn-back { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.07); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn-back:hover { background: rgba(255,255,255,0.12); }
  .header-title { font-size: 15px; font-weight: 600; color: #F5F5F7; letter-spacing: -0.2px; }
  .header-spacer { width: 34px; }

  .step-dots { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 0 2px; flex-shrink: 0; }
  .step-dot { height: 4px; border-radius: 2px; background: #2A2A2E; }
  .step-dot.active { width: 22px; background: #FF6B00; }
  .step-dot.done { width: 6px; background: #555; }
  .step-dot.inactive { width: 6px; }

  .scroll-area { flex: 1; overflow-y: auto; padding: 0 16px 16px; scrollbar-width: none; min-height: 0; }
  .scroll-area::-webkit-scrollbar { display: none; }

  .section-title { font-size: 26px; font-weight: 800; color: #F5F5F7; letter-spacing: -0.5px; margin-top: 20px; margin-bottom: 4px; }
  .section-subtitle { font-size: 14px; color: #8A8A96; margin-bottom: 28px; line-height: 1.4; }

  /* ─── Day Circles ─────────────────────── */
  .days-grid {
    display: flex; justify-content: space-between;
    padding: 0 4px; margin-bottom: 18px;
  }
  .day-circle {
    width: 44px; height: 44px; border-radius: 50%;
    border: 2px solid #3A3A42; background: #1C1C20;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .day-circle:active { transform: scale(0.92); }
  .day-circle.selected {
    background: #FF6B00; border-color: #FF6B00;
    box-shadow: 0 0 14px rgba(255,107,0,0.35);
  }
  .day-label {
    font-size: 14px; font-weight: 600; color: #8A8A96;
    transition: color 0.15s; pointer-events: none;
  }
  .day-circle.selected .day-label { color: #fff; font-weight: 700; }

  /* ─── Counter ─────────────────────────── */
  .counter {
    text-align: center; font-size: 13px; font-weight: 600;
    margin-bottom: 22px; transition: color 0.2s;
    min-height: 18px;
  }
  .counter.warn { color: #EF4444; }
  .counter.ok { color: #FF6B00; }

  /* ─── Tip Callout ─────────────────────── */
  .tip-callout {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border-radius: 10px;
    background: #1A1A1E;
    border-left: 3px solid #FF6B00;
    margin-bottom: 20px;
  }
  .tip-callout svg { flex-shrink: 0; margin-top: 1px; }
  .tip-text { font-size: 13px; color: #8A8A96; line-height: 19px; }

  /* ─── Long Run Block ──────────────────── */
  .long-run-block {
    padding: 0 16px; border-radius: 14px;
    background: #1C1C20; margin-bottom: 8px;
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height 300ms ease, opacity 200ms ease, padding 200ms ease;
  }
  .long-run-block.visible {
    max-height: 220px; opacity: 1; padding: 18px 16px;
  }
  .long-run-title { font-size: 16px; font-weight: 700; color: #F5F5F7; margin-bottom: 3px; }
  .long-run-sub { font-size: 13px; color: #8A8A96; margin-bottom: 14px; }
  .long-run-pills { display: flex; flex-wrap: wrap; gap: 8px; }

  .lr-pill {
    padding: 8px 16px; border-radius: 20px;
    border: 1px solid #3A3A42; background: #252529;
    font-size: 13px; font-weight: 600; color: #8A8A96;
    cursor: pointer; transition: all 0.2s;
    user-select: none;
  }
  .lr-pill:hover { background: #2E2E33; }
  .lr-pill:active { transform: scale(0.95); }
  .lr-pill.active {
    background: #FF6B00; border-color: #FF6B00; color: #fff;
    box-shadow: 0 0 10px rgba(255,107,0,0.25);
  }

  /* ─── Footer ──────────────────────────── */
  .footer { padding: 10px 16px 24px; flex-shrink: 0; background: #111214; border-top: 1px solid rgba(255,255,255,0.06); }
  .btn-continue { width: 100%; height: 52px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.25s; letter-spacing: -0.2px; }
  .btn-continue.inactive { background: #2A2A2E; color: #4A4A55; cursor: not-allowed; }
  .btn-continue.active { background: linear-gradient(135deg, #FF6B00 0%, #FF8C38 100%); color: #FFF; box-shadow: 0 4px 20px rgba(255,107,0,0.32); }
  .footer-status { text-align: center; font-size: 12px; color: #4A4A55; margin-top: 8px; font-weight: 500; min-height: 15px; }
  .footer-status.has-selection { color: #FF6B00; }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="header">
    <button class="btn-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="#8A8A96" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <span class="header-title">Crear tu plan</span>
    <div class="header-spacer"></div>
  </div>
  <div class="step-dots">
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot active"></div>
    <div class="step-dot inactive"></div>
  </div>

  <div class="scroll-area">
    <div class="section-title">Elige tus días</div>
    <div class="section-subtitle">Mínimo 3 días · Recomendado 4 días/semana</div>

    <div class="days-grid">
      <div class="day-circle" data-day="1" onclick="toggleDay(this)"><span class="day-label">L</span></div>
      <div class="day-circle" data-day="2" onclick="toggleDay(this)"><span class="day-label">M</span></div>
      <div class="day-circle" data-day="3" onclick="toggleDay(this)"><span class="day-label">X</span></div>
      <div class="day-circle" data-day="4" onclick="toggleDay(this)"><span class="day-label">J</span></div>
      <div class="day-circle" data-day="5" onclick="toggleDay(this)"><span class="day-label">V</span></div>
      <div class="day-circle" data-day="6" onclick="toggleDay(this)"><span class="day-label">S</span></div>
      <div class="day-circle" data-day="7" onclick="toggleDay(this)"><span class="day-label">D</span></div>
    </div>

    <div class="counter warn" id="counter">Selecciona mínimo 3 días</div>

    <div class="tip-callout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
        <circle cx="12" cy="12" r="10" stroke="#FF6B00" stroke-width="1.8"/>
        <path d="M12 8v4M12 16h.01" stroke="#FF6B00" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="tip-text">Elige días en los que puedas entrenar de forma consistente. Puedes cambiarlos más adelante.</span>
    </div>

    <div class="long-run-block" id="longRunBlock">
      <div class="long-run-title">Día de carrera larga</div>
      <div class="long-run-sub">El entrenamiento más largo de la semana</div>
      <div class="long-run-pills" id="longRunPills"></div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-continue inactive" id="btnContinue" disabled>Continuar</button>
    <div class="footer-status" id="footerStatus">Selecciona al menos 3 días</div>
  </div>
</div>

<script>
  var selectedDays = [];
  var longRunDay = null;
  var fullNames = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  var MIN = 3;

  function toggleDay(el) {
    var day = parseInt(el.dataset.day);
    var idx = selectedDays.indexOf(day);
    if (idx >= 0) {
      selectedDays.splice(idx, 1);
      el.classList.remove('selected');
    } else {
      if (selectedDays.length >= 6) return; // max 6
      selectedDays.push(day);
      el.classList.add('selected');
    }
    update();
  }

  function update() {
    // Counter
    var c = document.getElementById('counter');
    if (selectedDays.length < MIN) {
      c.textContent = 'Selecciona mínimo 3 días';
      c.className = 'counter warn';
    } else {
      c.textContent = selectedDays.length + ' días seleccionados';
      c.className = 'counter ok';
    }

    // Long run
    var block = document.getElementById('longRunBlock');
    var pills = document.getElementById('longRunPills');
    if (selectedDays.length >= 2) {
      block.classList.add('visible');
      var sorted = [...selectedDays].sort((a,b) => a-b);
      if (!longRunDay || !sorted.includes(longRunDay)) {
        longRunDay = sorted.includes(7) ? 7 : sorted.includes(6) ? 6 : sorted[sorted.length-1];
      }
      pills.innerHTML = '';
      sorted.forEach(function(day) {
        var p = document.createElement('div');
        p.className = 'lr-pill' + (day === longRunDay ? ' active' : '');
        p.textContent = fullNames[day-1];
        p.onclick = function(e) { e.stopPropagation(); longRunDay = day; update(); };
        pills.appendChild(p);
      });
    } else {
      block.classList.remove('visible');
      longRunDay = null;
    }

    // Footer
    var btn = document.getElementById('btnContinue');
    var status = document.getElementById('footerStatus');
    if (selectedDays.length >= MIN) {
      btn.className = 'btn-continue active'; btn.disabled = false;
      var lr = longRunDay ? fullNames[longRunDay-1] : '—';
      status.textContent = selectedDays.length + ' días/semana · Carrera larga: ' + lr;
      status.className = 'footer-status has-selection';
    } else {
      btn.className = 'btn-continue inactive'; btn.disabled = true;
      status.textContent = 'Selecciona al menos 3 días';
      status.className = 'footer-status';
    }
  }

  // Pre-select L, X, V, D for demo
  [1,3,5,7].forEach(function(d) {
    var el = document.querySelector('.day-circle[data-day="'+d+'"]');
    selectedDays.push(d);
    el.classList.add('selected');
  });
  update();
</script>
</body>
</html>
