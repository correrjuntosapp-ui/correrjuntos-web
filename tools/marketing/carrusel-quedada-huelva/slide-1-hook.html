<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',sans-serif;color:#f6f1e8;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 35%,rgba(249,115,22,0.10) 0%,transparent 60%);pointer-events:none}
.frame{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:90px 80px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;color:#f97316;font-weight:600;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.eyebrow::before{content:'';width:50px;height:1px;background:#f97316}
.coords{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:500;letter-spacing:1.5px;margin-bottom:140px}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:-100px}
.huge-num{font-size:520px;font-weight:900;line-height:0.85;letter-spacing:-25px;color:#f97316;font-family:'Inter',sans-serif;margin-bottom:30px}
.title{font-size:78px;font-weight:800;line-height:0.95;letter-spacing:-3px;color:#f6f1e8;margin-bottom:20px}
.title .accent{color:#f97316}
.subtitle{font-size:26px;font-weight:600;color:rgba(246,241,232,0.80);line-height:1.4;max-width:820px}
.subtitle strong{color:#f6f1e8;font-weight:800}

.location{margin-top:40px;display:flex;align-items:center;gap:16px;padding:20px 28px;background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.20);border-radius:12px;width:fit-content}
.location-pin{width:36px;height:36px;border-radius:8px;background:rgba(249,115,22,0.15);display:flex;align-items:center;justify-content:center;font-size:20px}
.location-text{display:flex;flex-direction:column;gap:2px}
.location-name{font-size:22px;font-weight:800;color:#f6f1e8;letter-spacing:-0.3px}
.location-meta{font-family:'JetBrains Mono',monospace;font-size:13px;color:rgba(246,241,232,0.55);font-weight:600;letter-spacing:1.2px;text-transform:uppercase}

.bottom{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(246,241,232,0.10);padding-top:30px;margin-top:auto}
.bottom-left{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:600;letter-spacing:1.5px}
.brand{font-size:22px;font-weight:800;color:#f97316;letter-spacing:0.5px}
.page-ind{position:absolute;top:60px;right:60px;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.40);font-weight:600;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="frame">
  <div class="page-ind">01 / 05</div>
  <div class="eyebrow">Cuenta atrás</div>
  <div class="coords">EVENTO REAL · QUEDADA OFICIAL · GRATIS</div>
  <div class="hero">
    <div class="huge-num">3</div>
    <div class="title">días para<br>la <span class="accent">quedada</span> de Huelva</div>
    <div class="subtitle">
      Sábado <strong>9 de mayo · 09:00</strong>.<br>
      Encuentro de runners de la zona. Sin compromiso.<br>
      <strong>Vente aunque sea tu primer día corriendo.</strong>
    </div>
    <div class="location">
      <div class="location-pin">📍</div>
      <div class="location-text">
        <div class="location-name">Punta Umbría · Huelva</div>
        <div class="location-meta">PASEO MARÍTIMO · KM 0</div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <div class="bottom-left">SLIDE 01 · QUEDADA HUELVA</div>
    <div class="brand">CorrerJuntos</div>
  </div>
</div>
</body></html>
