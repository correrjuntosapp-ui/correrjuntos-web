<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',-apple-system,system-ui,sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:url('https://images.pexels.com/photos/3621183/pexels-photo-3621183.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;opacity:.1;pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;text-align:center}
.logo-big{font-weight:900;font-size:48px;letter-spacing:-1px;margin-bottom:40px}
.logo-big-c{color:#fff}
.logo-big-j{color:#f97316}
h2{font-size:64px;font-weight:900;color:#fff;line-height:1.08;letter-spacing:-3px;margin-bottom:20px}
h2 span{color:#f97316}
.sub{font-size:24px;color:#94a3b8;margin-bottom:50px;line-height:1.5}
.cta-btn{display:inline-block;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;padding:24px 64px;border-radius:18px;font-size:24px;font-weight:800;letter-spacing:-.3px;box-shadow:0 12px 40px rgba(249,115,22,.35);margin-bottom:16px}
.cta-sub{font-size:18px;color:#64748b;margin-bottom:40px}
.stats{display:flex;gap:32px}
.stat{text-align:center}
.stat-num{font-size:36px;font-weight:900;color:#f97316}
.stat-label{font-size:14px;color:#64748b;margin-top:4px}
.bottom-text{position:absolute;bottom:50px;left:0;right:0;text-align:center;font-size:16px;color:rgba(255,255,255,.3)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="content">
  <div class="logo-big"><span class="logo-big-c">CORRER</span><span class="logo-big-j">JUNTOS</span></div>
  <h2>Deja de correr <span>solo.</span></h2>
  <p class="sub">Encuentra runners de tu nivel en tu zona.<br>Gratis en App Store y Google Play.</p>
  <div class="cta-btn">Descarga gratis</div>
  <div class="cta-sub">3 matches gratis al mes · Prueba 7 dias</div>
  <div class="stats">
    <div class="stat"><div class="stat-num">568+</div><div class="stat-label">Runners</div></div>
    <div class="stat"><div class="stat-num">92%</div><div class="stat-label">Match medio</div></div>
    <div class="stat"><div class="stat-num">8</div><div class="stat-label">Ciudades</div></div>
  </div>
</div>
<div class="bottom-text">correrjuntos.com · @correrjuntosapp</div>
</body>
</html>
