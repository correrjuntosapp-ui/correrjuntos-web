<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Slide 3 IG — Quedadas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#f6f1e8}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:90px 70px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;display:inline-block;border-left:4px solid #f97316;padding-left:16px}
h1{font-size:88px;font-weight:900;line-height:0.98;letter-spacing:-3px;margin-bottom:44px;color:#f6f1e8}
h1 .accent{color:#f97316}
.quedada-card{background:#131c30;border:1px solid rgba(246,241,232,0.10);border-radius:22px;padding:28px;margin-bottom:18px;display:flex;gap:24px;align-items:center}
.q-date{background:rgba(249,115,22,0.12);border-radius:14px;padding:18px 14px;text-align:center;min-width:88px;font-family:'JetBrains Mono',monospace}
.q-day{font-size:38px;font-weight:700;color:#f97316;line-height:1;letter-spacing:-1px}
.q-month{font-size:14px;color:#f97316;font-weight:600;letter-spacing:2px;margin-top:5px}
.q-info{flex:1}
.q-title{font-size:24px;font-weight:800;color:#f6f1e8;margin-bottom:7px;letter-spacing:-0.4px}
.q-meta{font-size:15px;color:rgba(246,241,232,0.62);margin-bottom:10px;font-weight:500;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px}
.q-tags{display:flex;gap:8px;flex-wrap:wrap}
.q-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;letter-spacing:0.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.q-tag.lvl{background:rgba(34,197,94,0.18);color:#22c55e}
.q-tag.lvl-int{background:rgba(249,115,22,0.18);color:#f97316}
.q-tag.dist{background:rgba(246,241,232,0.08);color:rgba(246,241,232,0.62)}
.q-avatars{display:flex;align-items:center}
.q-av{width:42px;height:42px;border-radius:50%;border:3px solid #131c30;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#f6f1e8;margin-left:-12px}
.q-av:first-child{margin-left:0}
.av-1{background:linear-gradient(135deg,#f97316,#ea580c)}
.av-2{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.av-3{background:linear-gradient(135deg,#22c55e,#16a34a)}
.av-4{background:rgba(246,241,232,0.12);color:rgba(246,241,232,0.62);font-size:11px;font-family:'JetBrains Mono',monospace}
.bottom-line{margin-top:32px;font-size:24px;color:rgba(246,241,232,0.72);font-weight:600;line-height:1.4;text-align:center}
.bottom-line strong{color:#f97316;font-weight:800}
.logo{position:absolute;top:60px;left:70px;font-weight:900;font-size:24px;letter-spacing:-1px}
.logo-c{color:#f6f1e8}.logo-j{color:#f97316}
.slide-num{position:absolute;top:60px;right:70px;font-size:18px;font-weight:600;color:rgba(246,241,232,0.30);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">La solución</div>
  <h1>Quedadas <span class="accent">reales</span></h1>
  <div class="quedada-card">
    <div class="q-date"><div class="q-day">04</div><div class="q-month">MAY</div></div>
    <div class="q-info">
      <div class="q-title">Rodaje suave por la marisma</div>
      <div class="q-meta">Huelva · 6 km · 09:00</div>
      <div class="q-tags"><span class="q-tag lvl">Principiante</span><span class="q-tag dist">2 km de ti</span></div>
    </div>
    <div class="q-avatars"><div class="q-av av-1">M</div><div class="q-av av-2">A</div><div class="q-av av-3">R</div><div class="q-av av-4">+2</div></div>
  </div>
  <div class="quedada-card">
    <div class="q-date"><div class="q-day">07</div><div class="q-month">MAY</div></div>
    <div class="q-info">
      <div class="q-title">Series 5x800 en pista</div>
      <div class="q-meta">Sevilla · 19:00</div>
      <div class="q-tags"><span class="q-tag lvl-int">Intermedio</span><span class="q-tag dist">8 km de ti</span></div>
    </div>
    <div class="q-avatars"><div class="q-av av-2">L</div><div class="q-av av-3">P</div><div class="q-av av-1">D</div></div>
  </div>
  <div class="bottom-line"><strong>Tú creas, tú decides.</strong> Sin clubes, sin cuotas.</div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">03 / 05</div>
</body></html>
