<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  .container {
    width: 1024px;
    height: 1024px;
    background: linear-gradient(145deg, #1a1a2e 0%, #0b1220 40%, #16213e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Decorative circles */
  .circle1 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
    top: -100px;
    right: -150px;
  }
  .circle2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
    bottom: -50px;
    left: -100px;
  }
  /* Star badge */
  .star-badge {
    width: 140px;
    height: 140px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    border-radius: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    box-shadow: 0 8px 40px rgba(255, 215, 0, 0.4);
    position: relative;
    z-index: 2;
  }
  .star-badge svg {
    width: 70px;
    height: 70px;
    fill: white;
  }
  .title {
    font-size: 72px;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: -1px;
    position: relative;
    z-index: 2;
  }
  .subtitle {
    font-size: 36px;
    font-weight: 600;
    background: linear-gradient(90deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
  }
  .features {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .check {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: white;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .feature-text {
    font-size: 30px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
  }
  .price-tag {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    padding: 18px 50px;
    border-radius: 50px;
    position: relative;
    z-index: 2;
  }
  .price-text {
    font-size: 34px;
    font-weight: 800;
    color: #0b1220;
  }
  .app-name {
    position: absolute;
    bottom: 40px;
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="container">
  <div class="circle1"></div>
  <div class="circle2"></div>

  <div class="star-badge">
    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
  </div>

  <div class="title">Premium</div>
  <div class="subtitle">Correr Juntos</div>

  <div class="features">
    <div class="feature">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
      <span class="feature-text">Quedadas ilimitadas</span>
    </div>
    <div class="feature">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
      <span class="feature-text">Sin anuncios</span>
    </div>
    <div class="feature">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
      <span class="feature-text">Estadísticas avanzadas</span>
    </div>
    <div class="feature">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
      <span class="feature-text">Badge exclusivo</span>
    </div>
  </div>

  <div class="price-tag">
    <span class="price-text">4,99 €/mes</span>
  </div>

  <span class="app-name">Correr Juntos</span>
</div>
</body>
</html>
