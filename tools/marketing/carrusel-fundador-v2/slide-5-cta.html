<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Slide 5 — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#f97316;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#0b1220}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,0.18) 0%,transparent 60%);pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:140px 80px;text-align:center;align-items:center}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#0b1220;letter-spacing:4px;text-transform:uppercase;margin-bottom:48px;opacity:0.85}
h1{font-size:148px;font-weight:900;line-height:0.92;letter-spacing:-6px;margin-bottom:56px;color:#0b1220}
h1 .accent{display:inline-block;background:#0b1220;color:#f97316;padding:8px 24px;border-radius:14px;font-weight:900;letter-spacing:-2px}
.sub{font-size:36px;color:rgba(11,18,32,0.85);font-weight:600;margin-bottom:72px;max-width:850px;line-height:1.35}
.cta-box{background:#0b1220;border-radius:28px;padding:44px 64px;display:inline-block;margin-bottom:36px;box-shadow:0 24px 70px rgba(0,0,0,0.3)}
.cta-pre{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:#f97316;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.cta-text{font-size:44px;font-weight:900;color:#f6f1e8;letter-spacing:-1px}
.handle{font-family:'JetBrains Mono',monospace;font-size:26px;color:rgba(11,18,32,0.72);font-weight:600;letter-spacing:0.5px}
.handle strong{color:#0b1220;font-weight:900}
.logo{position:absolute;top:80px;left:80px;font-weight:900;font-size:28px;letter-spacing:-1px}
.logo-c{color:#0b1220}.logo-j{color:#f6f1e8;background:#0b1220;padding:2px 10px;border-radius:6px}
.slide-num{position:absolute;top:80px;right:80px;font-size:20px;font-weight:600;color:rgba(11,18,32,0.45);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">No corras solo nunca más</div>
  <h1>Encuentra tu<br><span class="accent">compañero</span></h1>
  <p class="sub">Descarga la app. Crea tu perfil de runner. Encuentra a alguien con tu ritmo, en tu zona, con tu horario.</p>
  <div class="cta-box">
    <div class="cta-pre">Disponible en</div>
    <div class="cta-text">App Store · Google Play</div>
  </div>
  <div class="handle"><strong>correrjuntos.com</strong></div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">05 / 05</div>
</body></html>
