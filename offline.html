<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - CorrerJuntos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b1220;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #94a3b8; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #f97316;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #ea580c; }
    .brand { color: #f97316; font-weight: 800; font-size: 14px; margin-top: 32px; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1 id="title">Sin conexión</h1>
    <p id="message">Parece que no tienes conexión a internet. Comprueba tu red e inténtalo de nuevo.</p>
    <button class="btn" onclick="location.reload()" id="retry">Reintentar</button>
    <div class="brand">CORRERJUNTOS</div>
  </div>
  <script>
    (function(){
      var lang = (navigator.language || '').slice(0,2);
      var t = {
        en: { title: 'No connection', message: 'It looks like you\'re offline. Check your network and try again.', retry: 'Retry' },
        pt: { title: 'Sem conexão', message: 'Parece que você está offline. Verifique sua rede e tente novamente.', retry: 'Tentar novamente' },
        ru: { title: 'Нет соединения', message: 'Похоже, вы не в сети. Проверьте подключение и попробуйте снова.', retry: 'Повторить' }
      };
      if(t[lang]){
        document.documentElement.lang = lang;
        document.getElementById('title').textContent = t[lang].title;
        document.getElementById('message').textContent = t[lang].message;
        document.getElementById('retry').textContent = t[lang].retry;
      }
    })();
  </script>
</body>
</html>
