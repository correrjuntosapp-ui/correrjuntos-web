<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>IG Slide 2 — Pain stack</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#fff}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:100px 80px}
.eyebrow{font-size:18px;font-weight:700;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;display:inline-block;border-left:4px solid #f97316;padding-left:16px}
h1{font-size:88px;font-weight:900;line-height:1.0;letter-spacing:-3px;margin-bottom:60px;color:#fff}
.fail-list{display:flex;flex-direction:column;gap:24px}
.fail{display:flex;align-items:center;gap:24px;padding:24px 32px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;border-left:4px solid #ef4444}
.fail-x{width:48px;height:48px;background:rgba(239,68,68,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#ef4444;font-size:32px;font-weight:900;flex-shrink:0}
.fail-text{flex:1}
.fail-name{font-size:30px;font-weight:800;color:#fff;margin-bottom:4px}
.fail-why{font-size:18px;color:#94a3b8;font-weight:500}
.logo{position:absolute;top:60px;left:80px;font-weight:900;font-size:24px;letter-spacing:-1px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.slide-num{position:absolute;top:60px;right:80px;font-size:18px;font-weight:700;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Lo que he probado</div>
  <h1>Y nada funciona</h1>
  <div class="fail-list">
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Strava</div><div class="fail-why">Te dan kudos. No te dan compañía.</div></div></div>
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Clubes locales</div><div class="fail-why">Cuotas, horarios fijos, niveles que no son el tuyo.</div></div></div>
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Foros y grupos</div><div class="fail-why">Silencio o chats muertos.</div></div></div>
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Pedirle a amigos</div><div class="fail-why">"Yo no corro" — todos.</div></div></div>
  </div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">02 / 08</div>
</body></html>
