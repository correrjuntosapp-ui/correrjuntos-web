<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TT Slide 3 — Insight</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#f97316;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#0b1220}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 40%,rgba(255,255,255,0.18) 0%,transparent 60%);pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:140px 80px}
.eyebrow{font-size:20px;font-weight:700;color:#0b1220;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;opacity:0.85}
h1{font-size:160px;font-weight:900;line-height:0.92;letter-spacing:-7px;margin-bottom:48px;color:#0b1220}
.sub{font-size:36px;color:rgba(11,18,32,0.85);line-height:1.35;font-weight:600;max-width:900px}
.logo{position:absolute;top:80px;left:80px;font-weight:900;font-size:28px;letter-spacing:-1px}
.logo-c{color:#0b1220}.logo-j{color:#fff;background:#0b1220;padding:2px 8px;border-radius:4px}
.slide-num{position:absolute;top:80px;right:80px;font-size:20px;font-weight:700;color:rgba(11,18,32,0.4);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Y entonces lo entendí</div>
  <h1>El problema no era yo.</h1>
  <p class="sub">Era que ninguna herramienta estaba pensada para lo que de verdad necesitamos: <strong>alguien con quien correr</strong>.</p>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">03 / 08</div>
</body></html>
