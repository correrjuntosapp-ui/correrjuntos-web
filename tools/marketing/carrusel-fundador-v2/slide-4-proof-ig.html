<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Slide 4 IG — Proof</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#f6f1e8}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(249,115,22,0.14) 0%,transparent 60%);pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:90px 70px;text-align:center;align-items:center}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.big-num{font-family:'JetBrains Mono',monospace;font-size:240px;font-weight:800;line-height:1;letter-spacing:-12px;color:#f97316;margin-bottom:8px}
.big-num-suffix{font-size:42px;color:rgba(246,241,232,0.62);font-weight:600;margin-bottom:36px}
h1{font-size:56px;font-weight:900;line-height:1.05;letter-spacing:-2px;margin-bottom:42px;color:#f6f1e8;max-width:920px}
.cities{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:920px}
.city{background:rgba(246,241,232,0.06);border:1px solid rgba(246,241,232,0.14);padding:11px 22px;border-radius:100px;font-size:18px;font-weight:600;color:rgba(246,241,232,0.85);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
.city.h{background:rgba(249,115,22,0.18);border-color:rgba(249,115,22,0.45);color:#f97316}
.logo{position:absolute;top:60px;left:70px;font-weight:900;font-size:24px;letter-spacing:-1px}
.logo-c{color:#f6f1e8}.logo-j{color:#f97316}
.slide-num{position:absolute;top:60px;right:70px;font-size:18px;font-weight:600;color:rgba(246,241,232,0.30);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">No estás solo en esto</div>
  <div class="big-num">+600</div>
  <div class="big-num-suffix">runners ya están dentro</div>
  <h1>Y crece cada día en ciudades de toda España</h1>
  <div class="cities">
    <div class="city h">Huelva</div>
    <div class="city">Sevilla</div>
    <div class="city">Madrid</div>
    <div class="city">Barcelona</div>
    <div class="city">Valencia</div>
    <div class="city">Málaga</div>
    <div class="city">Zaragoza</div>
    <div class="city">Bilbao</div>
    <div class="city">Granada</div>
    <div class="city">+ tu ciudad</div>
  </div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">04 / 05</div>
</body></html>
