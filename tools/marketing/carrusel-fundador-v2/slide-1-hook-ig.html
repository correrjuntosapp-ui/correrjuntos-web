<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Slide 1 IG — Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#f6f1e8}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 30%,rgba(249,115,22,0.12) 0%,transparent 55%);pointer-events:none}
body::after{content:'';position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(180deg,transparent,rgba(11,18,32,0.95));pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:90px 70px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;display:inline-block;border-left:4px solid #f97316;padding-left:16px}
h1{font-size:120px;font-weight:900;line-height:0.93;letter-spacing:-5px;margin-bottom:32px;color:#f6f1e8}
h1 .accent{color:#f97316;display:block;margin-top:10px}
.sub{font-size:28px;color:rgba(246,241,232,0.65);line-height:1.4;font-weight:500;max-width:900px}
.logo{position:absolute;top:60px;left:70px;font-weight:900;font-size:24px;letter-spacing:-1px}
.logo-c{color:#f6f1e8}.logo-j{color:#f97316}
.slide-num{position:absolute;top:60px;right:70px;font-size:18px;font-weight:600;color:rgba(246,241,232,0.30);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.swipe{position:absolute;bottom:60px;left:0;right:0;text-align:center;color:rgba(246,241,232,0.45);font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;z-index:3}
.swipe::after{content:' →';color:#f97316;font-family:'Inter',sans-serif}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Una historia honesta</div>
  <h1>Empecé a correr solo.<span class="accent">Y lo sigo haciendo solo.</span></h1>
  <p class="sub">Llevo años buscando con quién entrenar. Y todo lo que he probado para encontrarlo, ha fallado.</p>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">01 / 05</div>
<div class="swipe">Desliza</div>
</body></html>
