<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',-apple-system,system-ui,sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:url('https://images.pexels.com/photos/2526878/pexels-photo-2526878.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;opacity:.08;pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;text-align:center}
.logo-big{font-weight:900;font-size:48px;letter-spacing:-1px;margin-bottom:40px}
.logo-big-c{color:#fff}
.logo-big-j{color:#f97316}
h2{font-size:72px;font-weight:900;color:#fff;line-height:1.08;letter-spacing:-3px;margin-bottom:24px}
h2 span{color:#f97316}
.sub{font-size:24px;color:#94a3b8;margin-bottom:50px;line-height:1.5}
.cta-btn{display:inline-block;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;padding:24px 64px;border-radius:18px;font-size:24px;font-weight:800;letter-spacing:-.3px;box-shadow:0 12px 40px rgba(249,115,22,.35);margin-bottom:20px}
.cta-sub{font-size:18px;color:#64748b}
.stores{display:flex;gap:16px;margin-top:40px}
.store{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 28px;color:#fff;font-size:16px;font-weight:600}
.bottom-text{position:absolute;bottom:60px;left:0;right:0;text-align:center;font-size:16px;color:rgba(255,255,255,.3)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="content">
  <div class="logo-big"><span class="logo-big-c">CORRER</span><span class="logo-big-j">JUNTOS</span></div>
  <h2>Entrena con <span>IA.</span><br>Corre acompanado.</h2>
  <p class="sub">Coach Jose + matching inteligente<br>por ritmo, horario y zona</p>
  <div class="cta-btn">Descarga gratis</div>
  <div class="cta-sub">Prueba 7 dias gratis</div>
  <div class="stores">
    <div class="store">App Store</div>
    <div class="store">Google Play</div>
  </div>
</div>
<div class="bottom-text">correrjuntos.com · @correrjuntosapp</div>
</body>
</html>
