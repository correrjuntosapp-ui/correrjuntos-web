<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>IG Slide 5 — Matching</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#fff}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:100px 80px}
.eyebrow{font-size:18px;font-weight:700;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;display:inline-block;border-left:4px solid #f97316;padding-left:16px}
h1{font-size:96px;font-weight:900;line-height:0.98;letter-spacing:-3px;margin-bottom:48px}
h1 span{color:#f97316}
.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
.match-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px 24px;text-align:center}
.match-icon{width:72px;height:72px;background:rgba(249,115,22,0.15);border:1.5px solid rgba(249,115,22,0.3);border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.match-icon svg{width:36px;height:36px;stroke:#f97316;stroke-width:2;fill:none}
.match-label{font-size:14px;font-weight:700;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.match-value{font-size:24px;font-weight:800;color:#fff}
.bottom-stat{padding:32px 36px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:16px;font-size:24px;color:#fff;font-weight:600;line-height:1.4}
.bottom-stat strong{color:#22c55e;font-weight:800}
.logo{position:absolute;top:60px;left:80px;font-weight:900;font-size:24px;letter-spacing:-1px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.slide-num{position:absolute;top:60px;right:80px;font-size:18px;font-weight:700;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Cómo funciona</div>
  <h1>Te empareja<br>por <span>3 cosas</span></h1>
  <div class="match-grid">
    <div class="match-card">
      <div class="match-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="match-label">Pace</div>
      <div class="match-value">5:30 — 6:30</div>
    </div>
    <div class="match-card">
      <div class="match-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div class="match-label">Zona</div>
      <div class="match-value">2 km radio</div>
    </div>
    <div class="match-card">
      <div class="match-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="match-label">Horario</div>
      <div class="match-value">Mañana / tarde</div>
    </div>
  </div>
  <div class="bottom-stat"><strong>No clubes. No cuotas. No compromisos.</strong> Solo runners cerca con tu pace.</div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">05 / 08</div>
</body></html>
