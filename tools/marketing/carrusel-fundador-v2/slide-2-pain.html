<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Slide 2 — Pain stack</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#f6f1e8}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:140px 80px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;display:inline-block;border-left:4px solid #f97316;padding-left:18px}
h1{font-size:104px;font-weight:900;line-height:1.0;letter-spacing:-4px;margin-bottom:80px;color:#f6f1e8}
.fail-list{display:flex;flex-direction:column;gap:32px}
.fail{display:flex;align-items:center;gap:32px;padding:36px 40px;background:rgba(246,241,232,0.04);border:1px solid rgba(246,241,232,0.10);border-radius:20px;border-left:5px solid #ef4444}
.fail-x{width:64px;height:64px;background:rgba(239,68,68,0.15);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#ef4444;font-size:42px;font-weight:900;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.fail-text{flex:1}
.fail-name{font-size:38px;font-weight:800;color:#f6f1e8;margin-bottom:6px;letter-spacing:-0.5px}
.fail-why{font-size:22px;color:rgba(246,241,232,0.62);font-weight:500;line-height:1.35}
.logo{position:absolute;top:80px;left:80px;font-weight:900;font-size:28px;letter-spacing:-1px}
.logo-c{color:#f6f1e8}.logo-j{color:#f97316}
.slide-num{position:absolute;top:80px;right:80px;font-size:20px;font-weight:600;color:rgba(246,241,232,0.30);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Lo que he probado</div>
  <h1>Y nada funciona</h1>
  <div class="fail-list">
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Strava</div><div class="fail-why">Te dan kudos. No te dan compañía.</div></div></div>
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Clubes locales</div><div class="fail-why">Cuotas, horarios fijos, niveles que no son el tuyo.</div></div></div>
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Foros y grupos</div><div class="fail-why">Silencio o chats muertos.</div></div></div>
    <div class="fail"><div class="fail-x">×</div><div class="fail-text"><div class="fail-name">Pedirle a amigos</div><div class="fail-why">"Yo no corro" — todos.</div></div></div>
  </div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">02 / 05</div>
</body></html>
