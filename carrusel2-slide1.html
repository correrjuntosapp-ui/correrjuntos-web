<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0b1220;font-family:'Inter',-apple-system,system-ui,sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:url('https://images.pexels.com/photos/3621183/pexels-photo-3621183.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;opacity:.08;pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,.15);border:1.5px solid rgba(249,115,22,.4);padding:10px 22px;border-radius:100px;font-size:16px;font-weight:700;color:#f97316;letter-spacing:1px;text-transform:uppercase;margin-bottom:40px}
.badge::before{content:'';width:8px;height:8px;background:#f97316;border-radius:50%}
h1{font-size:76px;font-weight:900;color:#fff;line-height:1.08;letter-spacing:-3px;margin-bottom:24px}
h1 span{color:#f97316}
.sub{font-size:24px;color:#94a3b8;line-height:1.5;max-width:700px;margin-bottom:50px}
.avatars{display:flex;align-items:center;justify-content:center;margin-bottom:30px}
.avatar{width:72px;height:72px;border-radius:36px;border:3px solid #0b1220;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin-left:-16px}
.avatar:first-child{margin-left:0}
.a1{background:linear-gradient(135deg,#f97316,#ea580c)}
.a2{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.a3{background:linear-gradient(135deg,#22c55e,#16a34a)}
.a4{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.a5{background:rgba(255,255,255,.1);color:#94a3b8;font-size:18px}
.stat{font-size:20px;color:rgba(255,255,255,.6);font-weight:500}
.slide-num{position:absolute;top:50px;right:60px;font-size:18px;font-weight:700;color:rgba(255,255,255,.3)}
.logo{position:absolute;top:50px;left:60px;font-weight:900;font-size:22px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.swipe{position:absolute;bottom:50px;left:0;right:0;text-align:center;color:rgba(255,255,255,.3);font-size:16px;font-weight:500}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="content">
  <div class="badge">Matching inteligente</div>
  <h1>Encuentra runners<br>de tu <span>nivel</span></h1>
  <p class="sub">Matching por ritmo, horario y zona. Conecta con tu companero ideal de entrenamiento.</p>
  <div class="avatars">
    <div class="avatar a1">CR</div>
    <div class="avatar a2">LM</div>
    <div class="avatar a3">AP</div>
    <div class="avatar a4">JR</div>
    <div class="avatar a5">+564</div>
  </div>
  <div class="stat">568+ runners ya conectados</div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">1/5</div>
<div class="swipe">Desliza →</div>
</body>
</html>
