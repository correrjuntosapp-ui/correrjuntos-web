<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Bar — CorrerJuntos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    gap: 60px;
    flex-direction: column;
    padding: 40px 20px;
  }

  h2 {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.5;
  }

  .phone {
    width: 390px;
    height: 260px;
    background: #0D0D1A;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    border: 2px solid #222;
  }

  /* Fake content area */
  .content {
    height: 100%;
    background: #111114;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 94px;
  }
  .content-text {
    color: #333;
    font-size: 14px;
    font-weight: 500;
  }

  /* ── Tab Bar ── */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 94px; /* 64 + 30 safe area */
    background: #0D0D1A;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    padding: 0 8px;
    padding-bottom: 30px;
  }
  .tab-bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
  }

  /* ── Tab Item ── */
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 8px;
    gap: 4px;
    position: relative;
    height: 64px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tab-item:hover .tab-icon { opacity: 0.8; }

  .tab-icon {
    width: 22px;
    height: 22px;
    transition: transform 0.2s ease, opacity 0.15s ease;
  }
  .tab-item.active .tab-icon {
    transform: scale(1.1);
  }
  .tab-item:not(.active) .tab-icon {
    opacity: 0.6;
  }

  .tab-label {
    font-size: 10px;
    font-weight: 400;
    color: #666680;
    letter-spacing: 0.3px;
    transition: all 0.15s ease;
  }
  .tab-item.active .tab-label {
    color: #FF6B00;
    font-weight: 600;
  }

  /* Active indicator */
  .active-indicator {
    position: absolute;
    top: 0;
    width: 20px;
    height: 2px;
    background: #FF6B00;
    border-radius: 2px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* ── Center Button ── */
  .center-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top: -16px;
    gap: 4px;
    position: relative;
    height: 64px;
    cursor: pointer;
  }

  .glow-ring {
    position: absolute;
    top: -4px;
    width: 64px;
    height: 64px;
    border-radius: 32px;
    background: rgba(255, 107, 0, 0.15);
  }

  .center-button {
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: linear-gradient(135deg, #FF6B00, #FF8C00);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(255, 107, 0, 0.5);
    position: relative;
    z-index: 2;
    transition: transform 0.15s ease;
  }
  .center-wrapper:active .center-button {
    transform: scale(0.92);
  }

  .center-label {
    font-size: 10px;
    color: #FF6B00;
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-top: 2px;
    position: relative;
    z-index: 2;
  }

  /* ── Badge ── */
  .badge {
    position: absolute;
    top: -4px;
    right: -6px;
    min-width: 14px;
    height: 14px;
    border-radius: 7px;
    background: #FF6B00;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 2px;
    border: 1.5px solid #0D0D1A;
  }
  .badge-text {
    font-size: 8px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
  }
  .icon-wrapper {
    position: relative;
  }

  /* ── Comparison section ── */
  .comparison {
    display: flex;
    gap: 40px;
    align-items: flex-start;
  }
  .version {
    text-align: center;
  }
  .version-label {
    color: #666;
    font-size: 12px;
    margin-bottom: 12px;
    font-weight: 500;
  }

  /* States demo */
  .states-row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .state-phone {
    width: 390px;
  }
</style>
</head>

      <!-- Social (with badge) -->

      <!-- Perfil -->

          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21v-1a7 7 0 0114 0v1" stroke-linecap="round"/>
        </svg>
        <span class="tab-label">Perfil</span>
      </div>
    </div>
  </div>
</div>
