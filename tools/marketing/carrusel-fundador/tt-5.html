<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TT Slide 5 — Matching</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#fff}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:140px 80px}
.eyebrow{font-size:20px;font-weight:700;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;display:inline-block;border-left:4px solid #f97316;padding-left:18px}
h1{font-size:112px;font-weight:900;line-height:0.98;letter-spacing:-4px;margin-bottom:64px}
h1 span{color:#f97316}
.match-grid{display:flex;flex-direction:column;gap:24px;margin-bottom:56px}
.match-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px 40px;display:flex;align-items:center;gap:32px}
.match-icon{width:96px;height:96px;background:rgba(249,115,22,0.15);border:1.5px solid rgba(249,115,22,0.3);border-radius:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.match-icon svg{width:48px;height:48px;stroke:#f97316;stroke-width:2;fill:none}
.match-text{flex:1}
.match-label{font-size:18px;font-weight:700;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.match-value{font-size:34px;font-weight:800;color:#fff}
.bottom-stat{padding:36px 40px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:18px;font-size:30px;color:#fff;font-weight:600;line-height:1.4;text-align:center}
.bottom-stat strong{color:#22c55e;font-weight:800}
.logo{position:absolute;top:80px;left:80px;font-weight:900;font-size:28px;letter-spacing:-1px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.slide-num{position:absolute;top:80px;right:80px;font-size:20px;font-weight:700;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Cómo funciona</div>
  <h1>Te empareja<br>por <span>3 cosas</span></h1>
  <div class="match-grid">
    <div class="match-card">
      <div class="match-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="match-text"><div class="match-label">Pace</div><div class="match-value">5:30 — 6:30 min/km</div></div>
    </div>
    <div class="match-card">
      <div class="match-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div class="match-text"><div class="match-label">Zona</div><div class="match-value">2 km de radio</div></div>
    </div>
    <div class="match-card">
      <div class="match-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="match-text"><div class="match-label">Horario</div><div class="match-value">Mañana o tarde</div></div>
    </div>
  </div>
  <div class="bottom-stat"><strong>No clubes. No cuotas. No compromisos.</strong></div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">05 / 08</div>
</body></html>
