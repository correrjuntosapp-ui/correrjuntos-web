<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:1080px;height:1350px;
  overflow:hidden;
  background:#0b1220;
  color:#f6f1e8;
  font-family:'Inter','SF Pro',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
}
body{
  padding:80px 70px 200px 70px;
  position:relative;
  display:flex;
  flex-direction:column;
}

/* === Background ember glow === */
body::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(249,115,22,0.18), transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 100%, rgba(249,115,22,0.12), transparent 60%);
  pointer-events:none;
  z-index:0;
}

body > *{position:relative;z-index:1}

/* === Top marker === */
.marker{
  display:flex;align-items:center;gap:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(246,241,232,0.55);
  font-weight:500;
}
.marker .dot{
  width:10px;height:10px;
  background:#f97316;
  border-radius:999px;
  flex-shrink:0;
}
.marker .rule{
  flex:0 0 60px;
  height:2px;
  background:#f97316;
}

/* === Eyebrow === */
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:#f97316;
  font-weight:600;
  display:flex;align-items:center;gap:14px;
}
/* Feature slides: start content from upper middle */
body.slide-feature .eyebrow{margin-top:120px}
/* Hook slides: push eyebrow + headline to lower-middle area */
body.slide-hook .eyebrow{margin-top:auto}
/* CTA slides: also lower-middle */
body.slide-cta .eyebrow{margin-top:auto}
.eyebrow::before{
  content:'';
  display:inline-block;
  width:32px;height:2px;
  background:#f97316;
}

/* === Headline (hook + cta slides) === */
.headline{
  margin-top:24px;
  font-weight:200;
  font-size:120px;
  line-height:0.96;
  letter-spacing:-0.025em;
  color:#f6f1e8;
}
.headline .ember{
  color:#f97316;
  font-weight:700;
}

/* === Title (feature slides, smaller than headline) === */
.title{
  margin-top:18px;
  font-weight:700;
  font-size:84px;
  line-height:1.02;
  letter-spacing:-0.025em;
  color:#f6f1e8;
}

/* === Subtitle/subline === */
.subline,.subtitle{
  margin-top:24px;
  font-size:32px;
  line-height:1.4;
  font-weight:400;
  color:rgba(246,241,232,0.78);
  letter-spacing:-0.005em;
  max-width:880px;
}

/* === Bullets === */
.bullets{
  margin-top:48px;
  display:flex;
  flex-direction:column;
  gap:22px;
}
.bullet{
  display:flex;
  align-items:flex-start;
  gap:18px;
  font-size:30px;
  line-height:1.35;
  color:#f6f1e8;
  letter-spacing:-0.005em;
  font-weight:400;
}
.bullet::before{
  content:'';
  display:inline-block;
  width:14px;height:14px;
  background:#f97316;
  border-radius:999px;
  flex-shrink:0;
  margin-top:14px;
}

/* === Stat box (hook slides) === */
.stat-box{
  margin-top:auto;
  padding:38px 46px;
  background:rgba(246,241,232,0.04);
  border:1.5px solid rgba(249,115,22,0.35);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;
  align-self:flex-start;
  max-width:560px;
}
.stat-label{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(246,241,232,0.6);
  font-weight:600;
}
.stat-value{
  font-size:64px;
  font-weight:800;
  letter-spacing:-0.02em;
  color:#f97316;
  line-height:1;
}

/* === Stores (cta slide only) === */
.stores{
  margin-top:48px;
  display:flex;
  flex-wrap:wrap;
  gap:18px;
}
.store{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px 30px;
  background:rgba(246,241,232,0.05);
  border:1.5px solid rgba(246,241,232,0.15);
  border-radius:14px;
  color:#f6f1e8;
}
.store svg{flex-shrink:0;width:32px;height:32px}
.store .meta{display:flex;flex-direction:column;line-height:1.05}
.store .small{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(246,241,232,0.55);
}
.store .big{
  font-size:21px;
  font-weight:700;
  margin-top:4px;
}

/* === Brand lockup (bottom) === */
.lockup{
  position:absolute;
  bottom:80px;left:70px;right:70px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  z-index:2;
}
.brand-name{
  font-size:32px;
  font-weight:800;
  letter-spacing:-0.02em;
  color:#f6f1e8;
}
.brand-name em{
  color:#f97316;
  font-style:normal;
}
.url-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  color:rgba(246,241,232,0.6);
  letter-spacing:0.05em;
}
.slide-num{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  color:rgba(246,241,232,0.45);
  letter-spacing:0.1em;
}

/* === Page count badge (top right) === */
.page-badge{
  position:absolute;
  top:80px;right:70px;
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  letter-spacing:0.18em;
  color:rgba(246,241,232,0.55);
  font-weight:600;
  z-index:2;
}
</style>
</head>
<body class="slide-__SLIDE_TYPE__">

<!-- TOP marker -->
<div class="marker">
  <span class="dot"></span>
  <span>__TOPIC_LABEL__</span>
  <span class="rule"></span>
</div>

<!-- Page count badge top right -->
<div class="page-badge">__PAGE_NUM__/05</div>

<!-- Main content (filled by template type) -->
__SLIDE_CONTENT__

<!-- Bottom brand lockup -->
<div class="lockup">
  <div class="brand-name">Correr<em>Juntos</em></div>
  <div class="url-tag">correrjuntos.com</div>
</div>

</body>
</html>
