  /* ── Read category from URL ── */
  var params = new URLSearchParams(window.location.search);
  var cat = params.get('cat') || '';
  var catInfo = CATS[cat];

  if(!catInfo){
    /* Slug inexistente: índice de categorías + noindex (hosting estático no permite 404 real sobre query param) */
    if(cat){
      var robots = document.createElement('meta');
      robots.name = 'robots'; robots.content = 'noindex,follow';
      document.head.appendChild(robots);
    }
    /* Show all categories */
    document.getElementById('catIcon').textContent = '📂';
    document.getElementById('catName').textContent = 'Running';
    document.getElementById('catDesc').textContent = cat
      ? 'Esa categoría no existe. Estas son las categorías disponibles:'
      : 'Selecciona una categoría para explorar artículos.';
    document.getElementById('pageTitle').textContent = 'Categorías | Blog CorrerJuntos';
    document.getElementById('breadCat').textContent = 'Categorías';

    var grid = document.getElementById('grid');
    grid.style.gridTemplateColumns = 'repeat(auto-fill,minmax(200px,1fr))';
    Object.keys(CATS).forEach(function(k){
      var c = CATS[k];
      var count = DB.filter(function(a){ return a.c === k; }).length;
      if(count === 0) return;
      var card = document.createElement('a');
      card.href = '/blog/categoria/?cat=' + k;
      card.className = 'article-card';
      card.style.cssText = 'text-align:center;padding:32px 20px';
      card.innerHTML = '<div style="font-size:2.5rem;margin-bottom:12px">'+c.icon+'</div>' +
        '<h2 style="font-size:1rem;margin-bottom:6px">'+c.name+'</h2>' +
        '<p style="font-size:.8rem;color:#64748b">'+count+' artículos</p>';
      grid.appendChild(card);
    });
    document.getElementById('catCount').textContent = Object.keys(CATS).length;
    document.querySelector('.cat-count').innerHTML = '<span>'+Object.keys(CATS).length+'</span> categorías';
    document.querySelector('.other-cats').style.display = 'none';
    return;
  }

  /* ── Set page info ── */
  document.getElementById('catIcon').textContent = catInfo.icon;
  document.getElementById('catName').textContent = catInfo.name;
  document.getElementById('catDesc').textContent = catInfo.desc;
  document.getElementById('breadCat').textContent = catInfo.name;
  document.getElementById('pageTitle').textContent = catInfo.name + ' | Blog CorrerJuntos';
  document.getElementById('metaDesc').setAttribute('content', catInfo.desc);

  /* Schema */
  document.getElementById('schemaLD').textContent = JSON.stringify({
    "@context":"https://schema.org",
    "@type":"CollectionPage",
    "name": catInfo.name + " — Blog CorrerJuntos",
    "description": catInfo.desc,
    "url": "https://www.correrjuntos.com/blog/categoria/?cat=" + cat,
    "breadcrumb":{
      "@type":"BreadcrumbList",
      "itemListElement":[
        {"@type":"ListItem","position":1,"name":"Inicio","item":"https://www.correrjuntos.com/"},
        {"@type":"ListItem","position":2,"name":"Blog","item":"https://www.correrjuntos.com/blog/"},
        {"@type":"ListItem","position":3,"name":catInfo.name}
      ]
    }
  });

  /* ── Filter articles ── */
  var articles = DB.filter(function(a){ return a.c === cat; });
  if(articles.length === 0){
    /* Categoría válida pero sin artículos: nunca mostrar una página vacía con "0 artículos" */
    location.replace('/blog/categoria/');
    return;
  }
  document.getElementById('catCount').textContent = articles.length;

  /* ── Build cards ── */
  var grid = document.getElementById('grid');
  articles.forEach(function(a){
    var card = document.createElement('a');
    card.href = '/blog/' + a.s;
    card.className = 'article-card';
    card.innerHTML = '<div class="card-img"><span class="card-emoji">'+catInfo.icon+'</span></div>' +

        '<div class="card-meta"><span class="meta">'+a.m+'</span><span class="card-arrow">Leer →</span></div>' +
      '</div>';
    grid.appendChild(card);
  });

  /* ── Other categories ── */
  var pills = document.getElementById('otherCats');
  Object.keys(CATS).forEach(function(k){
    var c = CATS[k];
    var count = DB.filter(function(a){ return a.c === k; }).length;
    if(count === 0) return;
    var pill = document.createElement('a');
    pill.href = '/blog/categoria/?cat=' + k;
    pill.className = 'cat-pill' + (k === cat ? ' current' : '');
