<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Comunidad Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',sans-serif;color:#f6f1e8;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 35%,rgba(249,115,22,0.08) 0%,transparent 60%);pointer-events:none}
.frame{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:90px 80px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;color:#f97316;font-weight:600;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.eyebrow::before{content:'';width:50px;height:1px;background:#f97316}
.coords{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:500;letter-spacing:1.5px;margin-bottom:140px}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:-100px}
.huge-num{font-size:480px;font-weight:900;line-height:0.85;letter-spacing:-22px;color:#f97316;font-family:'Inter',sans-serif;margin-bottom:30px}
.title{font-size:62px;font-weight:800;line-height:1;letter-spacing:-2px;color:#f6f1e8;margin-bottom:20px}
.title .accent{color:#f97316}
.subtitle{font-size:24px;font-weight:500;color:rgba(246,241,232,0.70);line-height:1.4;max-width:820px}
.subtitle strong{color:#f6f1e8;font-weight:700}
.bottom{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(246,241,232,0.10);padding-top:30px;margin-top:auto}
.bottom-left{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:600;letter-spacing:1.5px}
.brand{font-size:22px;font-weight:800;color:#f97316;letter-spacing:0.5px}
.page-ind{position:absolute;top:60px;right:60px;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.40);font-weight:600;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="frame">
  <div class="page-ind">01 / 05</div>
  <div class="eyebrow">Mapa real</div>
  <div class="coords">DATA: 30 ABRIL 2026 · 21:50 UTC · LIVE</div>
  <div class="hero">
    <div class="huge-num">663</div>
    <div class="title">personas que <span class="accent">no</span><br>quieren correr <span class="accent">solas</span></div>
    <div class="subtitle">
      <strong>30 países</strong>. <strong>4 continentes</strong>.<br>
      Ahora mismo. Mientras lees esto.<br><br>
      ¿Cuál es tu excusa?
    </div>
  </div>
  <div class="bottom">
    <div class="bottom-left">SLIDE 01 · COMUNIDAD VIVA</div>
    <div class="brand">CorrerJuntos</div>
  </div>
</div>
</body></html>
