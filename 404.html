<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Página no encontrada - CorrerJuntos</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1220;color:#cbd5e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.container{max-width:480px}
.code{font-size:8rem;font-weight:900;background:linear-gradient(135deg,#f97316,#ea580c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
h1{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:12px}
p{color:#94a3b8;margin-bottom:24px;line-height:1.6}
.links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.links a{display:inline-block;padding:12px 24px;border-radius:50px;font-weight:700;font-size:.9rem;text-decoration:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 4px 16px rgba(249,115,22,.25)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(249,115,22,.35)}
.btn-secondary{border:1px solid rgba(249,115,22,.3);color:#f97316}
.btn-secondary:hover{background:rgba(249,115,22,.08)}
.logo{margin-bottom:32px;font-size:1.2rem;font-weight:900;color:#fff;text-decoration:none;letter-spacing:-.02em}
.logo b{color:#f97316}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="logo">CORRER<b>JUNTOS</b></a>
  <div class="code">404</div>
  <h1>Esta ruta no existe</h1>
  <p>Parece que te has salido del recorrido. La página que buscas no existe o ha sido movida.</p>
  <div class="links">
    <a href="/" class="btn-primary">Volver al inicio</a>
    <a href="/blog" class="btn-secondary">Ver el blog</a>
    <a href="/cities" class="btn-secondary">Ciudades</a>
  </div>
</div>
</body>
</html>
