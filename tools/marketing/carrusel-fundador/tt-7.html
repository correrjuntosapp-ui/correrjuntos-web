<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TT Slide 7 — Proof</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#fff}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(249,115,22,0.12) 0%,transparent 60%);pointer-events:none}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:140px 80px;text-align:center;align-items:center}
.eyebrow{font-size:20px;font-weight:700;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.big-num{font-size:300px;font-weight:900;line-height:1;letter-spacing:-15px;color:#f97316;margin-bottom:12px}
.big-num-suffix{font-size:54px;color:#94a3b8;font-weight:600;margin-bottom:48px}
h1{font-size:72px;font-weight:900;line-height:1.05;letter-spacing:-3px;margin-bottom:60px;color:#fff;max-width:920px}
.cities{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;max-width:920px}
.city{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:14px 26px;border-radius:100px;font-size:22px;font-weight:600;color:#cbd5e1}
.city.h{background:rgba(249,115,22,0.15);border-color:rgba(249,115,22,0.4);color:#f97316}
.logo{position:absolute;top:80px;left:80px;font-weight:900;font-size:28px;letter-spacing:-1px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.slide-num{position:absolute;top:80px;right:80px;font-size:20px;font-weight:700;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">No estás solo en esto</div>
  <div class="big-num">+600</div>
  <div class="big-num-suffix">runners ya están dentro</div>
  <h1>Y crece cada día en ciudades de toda España</h1>
  <div class="cities">
    <div class="city h">Huelva</div>
    <div class="city">Sevilla</div>
    <div class="city">Madrid</div>
    <div class="city">Barcelona</div>
    <div class="city">Valencia</div>
    <div class="city">Málaga</div>
    <div class="city">Zaragoza</div>
    <div class="city">Bilbao</div>
    <div class="city">Granada</div>
    <div class="city">+ tu ciudad</div>
  </div>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">07 / 08</div>
</body></html>
