<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Strava vs CJ Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',sans-serif;color:#f6f1e8;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 35%,rgba(249,115,22,0.06) 0%,transparent 60%);pointer-events:none}
.frame{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:90px 80px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:18px;color:#f97316;font-weight:600;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.eyebrow::before{content:'';width:50px;height:1px;background:#f97316}
.coords{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:500;letter-spacing:1.5px;margin-bottom:160px}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:-100px}
.title{font-size:130px;font-weight:900;line-height:0.92;letter-spacing:-6px;color:#f6f1e8;margin-bottom:30px}
.title .accent{color:#f97316}
.title-sub{font-size:130px;font-weight:900;line-height:0.92;letter-spacing:-6px;color:#f97316}
.divider-row{display:flex;align-items:center;gap:20px;margin:60px 0}
.divider-line{flex:1;height:1px;background:rgba(246,241,232,0.20)}
.divider-text{font-family:'JetBrains Mono',monospace;font-size:18px;color:rgba(246,241,232,0.55);font-weight:600;letter-spacing:2px;text-transform:uppercase}
.subtitle{font-size:28px;font-weight:500;color:rgba(246,241,232,0.80);line-height:1.5;max-width:820px}
.subtitle strong{color:#f6f1e8;font-weight:700}
.bottom{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(246,241,232,0.10);padding-top:30px;margin-top:auto}
.bottom-left{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.45);font-weight:600;letter-spacing:1.5px}
.brand{font-size:22px;font-weight:800;color:#f97316;letter-spacing:0.5px}
.page-ind{position:absolute;top:60px;right:60px;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(246,241,232,0.40);font-weight:600;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="frame">
  <div class="page-ind">01 / 05</div>
  <div class="eyebrow">Comparativa honesta</div>
  <div class="coords">VS · NO ES UNA GUERRA · ES OTRA COSA</div>
  <div class="hero">
    <div class="title">Strava te <span class="accent">mide</span>.</div>
    <div class="title-sub">CJ te acompaña.</div>
    <div class="divider-row">
      <div class="divider-line"></div>
      <div class="divider-text">DIFERENCIA REAL</div>
      <div class="divider-line"></div>
    </div>
    <div class="subtitle">
      No competimos con Strava. <strong>La complementamos.</strong><br>
      Una app cuenta tus pasos. La otra te encuentra con quien correrlos.
    </div>
  </div>
  <div class="bottom">
    <div class="bottom-left">SLIDE 01 · COMPARATIVA</div>
    <div class="brand">CorrerJuntos</div>
  </div>
</div>
</body></html>
