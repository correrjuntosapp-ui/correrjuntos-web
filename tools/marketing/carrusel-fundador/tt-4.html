<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TT Slide 4 — Founder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:#0b1220;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;position:relative;color:#fff}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:140px 80px}
.eyebrow{font-size:20px;font-weight:700;color:#f97316;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;display:inline-block;border-left:4px solid #f97316;padding-left:18px}
h1{font-size:112px;font-weight:900;line-height:1.0;letter-spacing:-4px;margin-bottom:60px}
h1 span{color:#f97316}
.signature{display:flex;align-items:center;gap:28px;margin-bottom:64px;padding:32px 36px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.25);border-radius:24px}
.avatar-circle{width:108px;height:108px;border-radius:50%;background:linear-gradient(135deg,#f97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:900;color:#fff;flex-shrink:0}
.signature-info{flex:1}
.signature-name{font-size:40px;font-weight:800;color:#fff;margin-bottom:6px}
.signature-loc{font-size:22px;color:#94a3b8;font-weight:500}
.location-dot{display:inline-block;width:12px;height:12px;background:#22c55e;border-radius:50%;margin-right:10px;box-shadow:0 0 0 5px rgba(34,197,94,0.2)}
.quote{font-size:36px;color:#cbd5e1;line-height:1.4;font-weight:500;font-style:italic}
.quote::before{content:'\201C';color:#f97316;font-size:72px;line-height:0;display:inline-block;vertical-align:-14px;margin-right:10px;font-style:normal}
.logo{position:absolute;top:80px;left:80px;font-weight:900;font-size:28px;letter-spacing:-1px}
.logo-c{color:#fff}.logo-j{color:#f97316}
.slide-num{position:absolute;top:80px;right:80px;font-size:20px;font-weight:700;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
</style></head>
<body>
<div class="content">
  <div class="eyebrow">Quién hay detrás</div>
  <h1>Construí la app<br>que <span>me faltaba</span></h1>
  <div class="signature">
    <div class="avatar-circle">J</div>
    <div class="signature-info">
      <div class="signature-name">José</div>
      <div class="signature-loc"><span class="location-dot"></span>Huelva, España</div>
    </div>
  </div>
  <p class="quote">No quería otra app de tracking. Quería una que me ayudara a no correr solo.</p>
</div>
<div class="logo"><span class="logo-c">CORRER</span><span class="logo-j">JUNTOS</span></div>
<div class="slide-num">04 / 08</div>
</body></html>
