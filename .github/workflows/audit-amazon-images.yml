name: Audit Amazon CDN Images

# Cron mensual — primer lunes del mes a las 09:00 UTC
# + manual trigger via Actions UI
on:
  schedule:
    - cron: '0 9 1-7 * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Amazon image audit
        id: audit
        run: |
          set +e
          node tools/audit-amazon-images.cjs --json > audit-result.json
          AUDIT_EXIT=$?
          echo "exit_code=$AUDIT_EXIT" >> $GITHUB_OUTPUT

          # Pretty summary in step
          BROKEN=$(node -e "const r=require('./audit-result.json'); console.log(r.broken)")
          SCANNED=$(node -e "const r=require('./audit-result.json'); console.log(r.scanned)")
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT
          echo "scanned=$SCANNED" >> $GITHUB_OUTPUT

          if [ "$AUDIT_EXIT" -eq 0 ]; then
            echo "✅ Las $SCANNED imágenes están OK"
          else
            echo "❌ $BROKEN de $SCANNED imágenes están rotas"
            echo ""
            node tools/audit-amazon-images.cjs --quiet || true
          fi

      - name: Upload audit JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-amazon-images-${{ github.run_number }}
          path: audit-result.json
          retention-days: 90

      - name: Create GitHub issue if broken
        if: steps.audit.outputs.broken != '0' && steps.audit.outputs.broken != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('audit-result.json', 'utf8'));
            const date = new Date().toISOString().slice(0, 10);

            // Build markdown body
            let body = `## 🔍 Audit Amazon CDN Images — ${date}\n\n`;
            body += `**${result.broken} de ${result.scanned} imágenes rotas** detectadas en el blog.\n\n`;
            body += `### Lista de URLs caídas\n\n`;

            // Group by article for readability
            const byFile = {};
            for (const item of result.brokenList) {
              for (const f of item.files) {
                if (!byFile[f]) byFile[f] = [];
                byFile[f].push({ url: item.url, reason: item.reason });
              }
            }

            for (const [file, items] of Object.entries(byFile).sort()) {
              body += `**\`${file}\`** (${items.length} rotas)\n`;
              for (const it of items) {
                const short = it.url.match(/(I|P)\/[A-Za-z0-9.+-]+\.(?:jpg|jpeg|png)/);
                body += `- \`${it.reason}\` — \`${short ? short[0] : it.url}\`\n`;
              }
              body += `\n`;
            }

            body += `\n### Cómo arreglar\n`;
            body += `1. Para cada ASIN afectado, scrape Amazon page con UA Safari\n`;
            body += `2. Extraer hiRes URL del JSON embebido (\`"hiRes":"..."\`)\n`;
            body += `3. Verificar size > 5KB con curl\n`;
            body += `4. Reemplazar en archivos afectados\n\n`;
            body += `**Cron schedule**: primer lunes de cada mes 09:00 UTC.\n`;
            body += `**Run manual**: \`npm run audit:images\` localmente.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📷 ${result.broken} imágenes Amazon rotas detectadas (${date})`,
              body: body,
              labels: ['blog', 'maintenance', 'amazon-cdn']
            });
